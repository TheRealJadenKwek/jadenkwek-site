<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Research — Jaden Kwek</title>
  <meta name="description" content="Equity research notes, investment memos, and financial models by Jaden Kwek." />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="img/favicon.svg" type="image/svg+xml" />
</head>
<body>

<div id="site-loader"><div class="loader-logo">Jaden Kwek</div></div>

<div id="nav-placeholder"></div>

<!-- Page Header -->
<div class="page-header">
  <div class="container">
    <div class="page-header-label">Investment Research</div>
    <h1>Research Notes</h1>
    <p>Long-form equity research with supporting financial models and investment memos. Not financial advice.</p>
  </div>
</div>


<!-- Research Grid -->
<section class="section" style="padding-top:3rem">
  <div class="container">

    <!-- Filter Bar -->
    <div class="filter-bar" id="filter-bar">
      <!-- Populated by JS -->
    </div>

    <!-- Count -->
    <div style="font-size:0.82rem;color:var(--text-muted);margin-bottom:1.5rem" id="research-count"></div>

    <!-- Grid -->
    <div class="research-grid" id="research-grid">
      <!-- Populated by JS -->
    </div>


  </div>
</section>

<div id="footer-placeholder"></div>

<script src="js/content.js"></script>
<script src="js/main.js"></script>
<script>
  initPage();
  renderResearchPage();

  // Update count after render
  const items = document.querySelectorAll('#research-grid .card');
  const countEl = document.getElementById('research-count');
  if (countEl) countEl.textContent = `${CONTENT.research.length} note${CONTENT.research.length !== 1 ? 's' : ''}`;
</script>
</body>
</html>
